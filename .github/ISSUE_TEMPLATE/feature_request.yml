name: Feature request
description: Suggest a focused improvement to MacVoice.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What dictation workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed experience
    validations:
      required: true
